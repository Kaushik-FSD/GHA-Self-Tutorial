# This is your Jenkins Credentials Manager equivalent. Three levels: repo, environment, org.

name: Secrets Demo

on:
  push:
    branches: [master]
    paths:
      - 'src/**'            # only run if something inside src/ changed
      - '!src/**/*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 'environment:' scopes secrets to a specific GitHub Environment
    # (more on Environments in Phase 6 — for now, just know this unlocks env-level secrets)
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # ── Accessing secrets ────────────────────────────────────────────
      - name: Use secrets via env (preferred pattern)
        env:
          # Secrets are never injected directly into ${{ }} in run: commands
          # Always pass them through env: first — safer and cleaner
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_KEY:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Connecting to DB..."
          # Use $DB_PASSWORD in shell — GHA masks the value in logs automatically

      # ── Passing secrets to actions via 'with:' ───────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}   # use access token, never password

      # ── GITHUB_TOKEN — the automatic secret ─────────────────────────
      # Every workflow gets this for free. No setup needed.
      # Scoped to the repo. Expires when the workflow finishes.
      - name: Push to GHCR using built-in token
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$REGISTRY_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin