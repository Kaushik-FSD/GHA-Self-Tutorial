name: Complete Workflow Trigger

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - '!src/**/*.md'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Env'
        required: true
        type: choice
        default: 'staging'
        options:
          - staging
          - production

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Clean package
        run: mvn clean package -DskipTests
      
      - name: Generate a version string
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Print version
        run: echo "Built version ${{ steps.version.outputs.VERSION }}-${{ github.ref_name }}"

      - name: Upload JAR
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar